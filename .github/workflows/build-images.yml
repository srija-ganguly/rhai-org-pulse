name: Build & Push Images

on:
  workflow_dispatch:
    inputs:
      core_tag:
        description: 'Core image tag override (default: version from npm package)'
        required: false
        type: string
  push:
    branches: [main, preprod]
    paths:
      # Backend
      - 'server/index.js'
      - 'modules/*/server/**'
      - 'platform/*/server/**'
      - 'deploy/ai-eng.backend.Dockerfile'
      # Frontend
      - 'public/**'
      - 'modules/*/client/**'
      - 'platform/**'
      - 'index.html'
      - 'vite.config.mjs'
      - 'tailwind.config.mjs'
      - 'postcss.config.mjs'
      - 'deploy/ai-eng.frontend.Dockerfile'
      # Shared
      - 'modules/*/module.json'
      - 'package*.json'

permissions:
  contents: read

concurrency:
  group: build-images-${{ github.ref_name }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: quay.io/org-pulse/team-tracker-backend
  FRONTEND_IMAGE: quay.io/org-pulse/team-tracker-frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BACKEND=false
          FRONTEND=false

          # Check backend paths (platform extensions can have server routes)
          if echo "$CHANGED" | grep -qE '^(server/index\.js|modules/[^/]+/server/|modules/[^/]+/module\.json|platform/[^/]+/server/|platform/[^/]+/manifest\.json|deploy/ai-eng\.backend\.Dockerfile|package)'; then
            BACKEND=true
          fi

          # Check frontend paths
          if echo "$CHANGED" | grep -qE '^(public/|modules/[^/]+/client/|modules/[^/]+/module\.json|platform/|index\.html|vite\.config|tailwind\.config|postcss\.config|deploy/ai-eng\.frontend.*\.Dockerfile|package)'; then
            FRONTEND=true
          fi

          # workflow_dispatch builds both
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BACKEND=true
            FRONTEND=true
          fi

          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "Backend: $BACKEND, Frontend: $FRONTEND"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run setup
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ════════════════════════════════════════
  # Version Bump (main only)
  # ════════════════════════════════════════
  version-bump:
    name: Bump Version
    needs: [test, detect-changes]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      build_sha: ${{ steps.push.outputs.build_sha }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(npm version patch --no-git-tag-version)

          # If this tag already exists (e.g. from a partial previous run),
          # keep bumping until we find an unused version
          while git ls-remote --tags origin "refs/tags/${NEW}" | grep -q .; do
            echo "Tag ${NEW} already exists, bumping again..."
            NEW=$(npm version patch --no-git-tag-version)
          done

          echo "Bumped ${CURRENT} -> ${NEW}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        id: push
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: ${VERSION} [skip ci]"
          git tag "${VERSION}"
          git push origin main --tags
          BUILD_SHA=$(git rev-parse HEAD)
          echo "build_sha=${BUILD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Build SHA: ${BUILD_SHA}"

  # ════════════════════════════════════════
  # Resolve Core Image Tag
  # ════════════════════════════════════════
  resolve-core-tag:
    name: Resolve Core Tag
    needs: [version-bump]
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      core_tag: ${{ steps.resolve.outputs.core_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version-bump.outputs.build_sha || github.sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - run: npm ci --ignore-scripts

      - name: Resolve core tag
        id: resolve
        run: |
          if [ -n "${{ inputs.core_tag }}" ]; then
            CORE_TAG="${{ inputs.core_tag }}"
          else
            CORE_VERSION=$(node -p "require('@org-pulse/core/package.json').version")
            CORE_TAG="v${CORE_VERSION}"
          fi
          echo "core_tag=${CORE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Core tag: ${CORE_TAG}"

  # ════════════════════════════════════════
  # AI Eng Images
  # ════════════════════════════════════════
  build-backend:
    name: Build & Push Backend
    needs: [test, detect-changes, version-bump, resolve-core-tag]
    if: |
      always() &&
      needs.test.result == 'success' &&
      needs.detect-changes.outputs.backend == 'true' &&
      needs.resolve-core-tag.result == 'success' &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      BUILD_SHA: ${{ needs.version-bump.outputs.build_sha || github.sha }}
      CORE_TAG: ${{ needs.resolve-core-tag.outputs.core_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version-bump.outputs.build_sha || github.sha }}

      - name: Pull core backend image
        run: docker pull quay.io/org-pulse/org-pulse-core-backend:${CORE_TAG}

      - name: Build AI Eng backend image
        run: |
          docker build \
            -f deploy/ai-eng.backend.Dockerfile \
            --build-arg CORE_TAG=${CORE_TAG} \
            -t ${{ env.BACKEND_IMAGE }}:${BUILD_SHA} \
            .

      - name: Smoke test
        run: |
          docker run -d --name backend-smoke -p 3001:3001 \
            -e DEMO_MODE=true \
            ${{ env.BACKEND_IMAGE }}:${BUILD_SHA}
          echo "Waiting for backend to start..."
          sleep 5
          if curl -sf --max-time 5 http://localhost:3001/api/healthz > /dev/null 2>&1; then
            echo "AI Eng backend smoke test passed"
          else
            echo "AI Eng backend smoke test failed"
            docker logs backend-smoke
            docker stop backend-smoke
            exit 1
          fi
          docker stop backend-smoke

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          BRANCH_TAG=${{ github.ref_name == 'preprod' && 'preprod' || 'latest' }}
          docker tag ${{ env.BACKEND_IMAGE }}:${BUILD_SHA} ${{ env.BACKEND_IMAGE }}:${BRANCH_TAG}
          docker push ${{ env.BACKEND_IMAGE }}:${BUILD_SHA}
          docker push ${{ env.BACKEND_IMAGE }}:${BRANCH_TAG}

  build-frontend:
    name: Build & Push Frontend
    needs: [test, detect-changes, version-bump, resolve-core-tag]
    if: |
      always() &&
      needs.test.result == 'success' &&
      needs.detect-changes.outputs.frontend == 'true' &&
      needs.resolve-core-tag.result == 'success' &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      BUILD_SHA: ${{ needs.version-bump.outputs.build_sha || github.sha }}
      CORE_TAG: ${{ needs.resolve-core-tag.outputs.core_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version-bump.outputs.build_sha || github.sha }}

      - name: Pull core frontend images
        run: |
          docker pull quay.io/org-pulse/org-pulse-core-frontend-builder:${CORE_TAG}
          docker pull quay.io/org-pulse/org-pulse-core-frontend-runtime:${CORE_TAG}

      - name: Build AI Eng frontend image
        run: |
          docker build \
            -f deploy/ai-eng.frontend.Dockerfile \
            --build-arg CORE_TAG=${CORE_TAG} \
            -t ${{ env.FRONTEND_IMAGE }}:${BUILD_SHA} \
            .

      - name: Build AI Eng backend image (needed for smoke tests)
        run: |
          docker pull quay.io/org-pulse/org-pulse-core-backend:${CORE_TAG}
          docker build \
            -f deploy/ai-eng.backend.Dockerfile \
            --build-arg CORE_TAG=${CORE_TAG} \
            -t ${{ env.BACKEND_IMAGE }}:${BUILD_SHA} \
            .

      - name: Run frontend smoke tests with Playwright
        run: make smoke-test CONTAINER_RUNTIME=docker FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${BUILD_SHA} BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${BUILD_SHA}

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          BRANCH_TAG=${{ github.ref_name == 'preprod' && 'preprod' || 'latest' }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${BUILD_SHA} ${{ env.FRONTEND_IMAGE }}:${BRANCH_TAG}
          docker push ${{ env.FRONTEND_IMAGE }}:${BUILD_SHA}
          docker push ${{ env.FRONTEND_IMAGE }}:${BRANCH_TAG}

  # ════════════════════════════════════════
  # Deploy Image Tag Updates
  # ════════════════════════════════════════
  update-preprod-image:
    name: Update Preprod Image Tags
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/preprod' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: preprod
          token: ${{ steps.app-token.outputs.token }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: '5.8.1'

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        working-directory: deploy/openshift/overlays/ai-eng-preprod
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        working-directory: deploy/openshift/overlays/ai-eng-preprod
        run: |
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/ai-eng-preprod > /dev/null

      - name: Push deploy commit
        run: |
          PARTS=""
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            PARTS="backend"
          fi
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}frontend"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/openshift/overlays/ai-eng-preprod/kustomization.yaml
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "deploy: update ${PARTS} image to ${{ github.sha }}"
          git push origin preprod

  update-prod-image:
    name: Update Prod Image Tags
    needs: [detect-changes, build-backend, build-frontend, version-bump]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    env:
      BUILD_SHA: ${{ needs.version-bump.outputs.build_sha || github.sha }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: '5.8.1'

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        working-directory: deploy/openshift/overlays/ai-eng-prod
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${BUILD_SHA}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        working-directory: deploy/openshift/overlays/ai-eng-prod
        run: |
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:${BUILD_SHA}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/ai-eng-prod > /dev/null

      - name: Push deploy commit
        run: |
          VERSION=${{ needs.version-bump.outputs.version || 'unknown' }}
          PARTS=""
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            PARTS="backend"
          fi
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}frontend"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/openshift/overlays/ai-eng-prod/kustomization.yaml
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "deploy: update ${PARTS} image to ${VERSION} (${BUILD_SHA}) [skip ci]"
          git push origin main

name: Build & Push Images

on:
  workflow_dispatch:
  push:
    branches: [main, preprod]
    paths:
      # Backend
      - 'server/**'
      - 'modules/*/server/**'
      - 'shared/server/**'
      - 'deploy/backend.Dockerfile'
      # Frontend
      - 'src/**'
      - 'public/**'
      - 'modules/*/client/**'
      - 'shared/client/**'
      - 'index.html'
      - 'vite.config.mjs'
      - 'tailwind.config.mjs'
      - 'postcss.config.mjs'
      - 'deploy/frontend.Dockerfile'
      - 'deploy/nginx.conf'
      - 'deploy/nginx-entrypoint.sh'
      # Shared
      - 'modules/*/module.json'
      - 'package*.json'
      # Smoke tests
      - 'tests/smoke/**'
      - 'playwright.config.js'

concurrency:
  group: build-images-${{ github.ref_name }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: quay.io/org-pulse/team-tracker-backend
  FRONTEND_IMAGE: quay.io/org-pulse/team-tracker-frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BACKEND=false
          FRONTEND=false

          # Check backend paths
          if echo "$CHANGED" | grep -qE '^(server/|modules/[^/]+/server/|modules/[^/]+/module\.json|shared/server/|deploy/backend\.Dockerfile|package)'; then
            BACKEND=true
          fi

          # Check frontend paths
          if echo "$CHANGED" | grep -qE '^(src/|public/|modules/[^/]+/client/|modules/[^/]+/module\.json|shared/client/|index\.html|vite\.config|tailwind\.config|postcss\.config|deploy/frontend\.Dockerfile|deploy/nginx\.conf|deploy/nginx-entrypoint\.sh|tests/smoke/|playwright\.config|package)'; then
            FRONTEND=true
          fi

          # workflow_dispatch builds both
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BACKEND=true
            FRONTEND=true
          fi

          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "Backend: $BACKEND, Frontend: $FRONTEND"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build-backend:
    name: Build & Push Backend
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f deploy/backend.Dockerfile \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            .

      - name: Smoke test
        run: |
          docker run -d --name backend-smoke -p 3001:3001 ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          echo "Waiting for backend to start..."
          sleep 5
          if curl -sf --max-time 5 http://localhost:3001 > /dev/null 2>&1; then
            echo "✅ Smoke test passed — backend responded on port 3001"
          else
            echo "⚠️  Backend didn't respond to HTTP, checking if process is running..."
            if docker exec backend-smoke sh -c 'kill -0 1 2>/dev/null'; then
              echo "✅ Smoke test passed — backend process is alive and listening"
            else
              echo "❌ Smoke test failed — backend process crashed"
              docker logs backend-smoke
              docker stop backend-smoke
              exit 1
            fi
          fi
          docker logs backend-smoke
          docker stop backend-smoke

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          BRANCH_TAG=${{ github.ref_name == 'preprod' && 'preprod' || 'latest' }}
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:${BRANCH_TAG}
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:${BRANCH_TAG}

  build-frontend:
    name: Build & Push Frontend
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: make build-frontend-image CONTAINER_RUNTIME=docker FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build backend image (needed for frontend smoke tests to work)
        run: make build-backend-image CONTAINER_RUNTIME=docker BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Run frontend smoke tests with Playwright
        run: make smoke-test CONTAINER_RUNTIME=docker FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          BRANCH_TAG=${{ github.ref_name == 'preprod' && 'preprod' || 'latest' }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:${BRANCH_TAG}
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:${BRANCH_TAG}

  update-preprod-image:
    name: Update Preprod Image Tags
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/preprod' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: preprod
          token: ${{ steps.app-token.outputs.token }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: '5.8.1'

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        working-directory: deploy/openshift/overlays/preprod
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        working-directory: deploy/openshift/overlays/preprod
        run: |
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/preprod > /dev/null

      - name: Push deploy commit
        run: |
          PARTS=""
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            PARTS="backend"
          fi
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}frontend"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/openshift/overlays/preprod/kustomization.yaml
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "deploy: update ${PARTS} image to ${{ github.sha }}"
          git push origin preprod

  update-prod-image:
    name: Update Prod Image Tags
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: '5.8.1'

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        working-directory: deploy/openshift/overlays/prod
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        working-directory: deploy/openshift/overlays/prod
        run: |
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/prod > /dev/null

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Build commit message and PR title based on what changed
          PARTS=""
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            PARTS="backend"
          fi
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}frontend"
          fi

          BRANCH="deploy/image-update-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add deploy/openshift/overlays/prod/kustomization.yaml
          git commit -m "deploy: update ${PARTS} image to ${{ github.sha }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "deploy: update ${PARTS} image to ${GITHUB_SHA::7}" \
            --body "Automated image tag update for ${PARTS} to \`${{ github.sha }}\`." \
            --label automated
          gh pr merge "$BRANCH" --auto --squash

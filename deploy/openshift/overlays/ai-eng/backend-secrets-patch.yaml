apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            # AI Eng module secrets — appended via strategic merge patch
            - name: PRODUCT_PAGES_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: PRODUCT_PAGES_CLIENT_ID
                  optional: true
            - name: PRODUCT_PAGES_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: PRODUCT_PAGES_CLIENT_SECRET
                  optional: true
            - name: FEATURE_TRAFFIC_GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: FEATURE_TRAFFIC_GITLAB_TOKEN
                  optional: true
            - name: GITLAB_CEE_REDHAT_DOCS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: GITLAB_CEE_REDHAT_DOCS_TOKEN
                  optional: true
            - name: SMARTSHEET_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: SMARTSHEET_API_TOKEN
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-backup-credentials
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-backup-credentials
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_BACKUP_BUCKET
              valueFrom:
                secretKeyRef:
                  name: aws-backup-credentials
                  key: AWS_BACKUP_BUCKET
                  optional: true

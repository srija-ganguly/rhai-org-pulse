apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# AI Engineering shared configuration — extends the core base with
# AI Eng-specific secrets and module images. Environment overlays
# (ai-eng-dev, ai-eng-preprod, ai-eng-prod) extend this.

resources:
  - https://github.com/red-hat-data-services/org-pulse-core//deploy/openshift/base?ref=v2.0.13

patches:
  - path: backend-secrets-patch.yaml
  # JSON 6902 append — adds to base arrays without replacing existing entries
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: google-sa-key
          mountPath: /etc/secrets/google-sa-key.json
          subPath: google-sa-key.json
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: google-sa-key
          secret:
            secretName: google-sa-key
            optional: true

configMapGenerator:
  - name: team-tracker-config
    behavior: merge
    literals:
      - ADMIN_EMAILS=acorvin@redhat.com,acorvin@cluster.local,jalberts@redhat.com
      - CRON_ADMIN_EMAIL=acorvin@redhat.com
      - GITHUB_APP_ID=3263553
      - GITHUB_APP_INSTALLATION_ID=121149773

# Override core images with AI Eng full images
images:
  - name: quay.io/org-pulse/org-pulse-core-backend
    newName: quay.io/org-pulse/team-tracker-backend
    newTag: latest
  - name: quay.io/org-pulse/org-pulse-core-frontend
    newName: quay.io/org-pulse/team-tracker-frontend
    newTag: latest

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: team-tracker

resources:
  - ../../base
  - namespace.yaml

patches:
  # Remove OpenShift-specific resources
  - path: remove-route.yaml
  - path: remove-api-route.yaml
  - path: remove-oauth-serviceaccount.yaml
  # Strip OAuth proxy from frontend deployment
  - target:
      kind: Deployment
      name: frontend
    path: frontend-deployment-patch.yaml
  # Set imagePullPolicy: Never for local images
  - target:
      kind: Deployment
      name: backend
    path: backend-deployment-patch.yaml
  # Simplify frontend service: NodePort on 8080 only
  - target:
      kind: Service
      name: team-tracker
    path: frontend-service-patch.yaml

images:
  - name: quay.io/org-pulse/org-pulse-core-backend
    newName: localhost/team-tracker-backend
    newTag: local
  - name: quay.io/org-pulse/org-pulse-core-frontend
    newName: localhost/team-tracker-frontend
    newTag: local

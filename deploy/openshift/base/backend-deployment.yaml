apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: team-tracker
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: team-tracker
      component: backend
  template:
    metadata:
      labels:
        app: team-tracker
        component: backend
    spec:
      containers:
        - name: backend
          image: quay.io/org-pulse/org-pulse-core-backend:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: team-tracker-config
          env:
            # Platform secrets — used by core team-tracker module
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: JIRA_EMAIL
                  optional: true
            - name: JIRA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: JIRA_TOKEN
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: GITHUB_TOKEN
                  optional: true
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: team-tracker-secrets
                  key: GITLAB_TOKEN
                  optional: true
            - name: PROXY_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: proxy-auth-secret
                  key: secret
                  optional: true
            # Roster sync secrets (optional — sync won't run without them)
            - name: IPA_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: ipa-credentials
                  key: IPA_BIND_DN
                  optional: true
            - name: IPA_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ipa-credentials
                  key: IPA_BIND_PASSWORD
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: google-sa-key
              mountPath: /etc/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: team-tracker-data
        - name: google-sa-key
          secret:
            secretName: google-sa-key
            optional: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: team-tracker
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-tracker
      component: frontend
  template:
    metadata:
      labels:
        app: team-tracker
        component: frontend
    spec:
      serviceAccountName: frontend-proxy
      initContainers:
        - name: render-config
          image: registry.access.redhat.com/ubi9/ubi-minimal
          command: ["sh", "-c"]
          args:
            - |
              sed "s|\${PROXY_AUTH_SECRET}|${PROXY_AUTH_SECRET}|g" \
                /template/app.conf.template > /rendered/default.conf
          env:
            - name: PROXY_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: proxy-auth-secret
                  key: secret
                  optional: true
          volumeMounts:
            - name: config-template
              mountPath: /template
              readOnly: true
            - name: rendered-config
              mountPath: /rendered
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.16
          ports:
            - containerPort: 4180
              name: proxy
              protocol: TCP
          args:
            - --https-address=:4180
            - --http-address=
            - --provider=openshift
            - --openshift-service-account=frontend-proxy
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/cookie-secret/session_secret
            - --pass-user-headers=true
            - --email-domain=*
            - --skip-auth-regex=^/api/docs
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: cookie-secret
              mountPath: /etc/proxy/cookie-secret
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
        - name: nginx
          image: quay.io/org-pulse/org-pulse-core-frontend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: rendered-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: proxy-tls
          secret:
            secretName: frontend-proxy-tls
        - name: cookie-secret
          secret:
            secretName: frontend-proxy-cookie
        - name: config-template
          configMap:
            name: nginx-config-template
        - name: rendered-config
          emptyDir: {}
